{% extends 'base.html' %}

{% block title %}Add Schedule Slot{% endblock %}

{% block content %}
<div class="container mt-5">

    <div class="row justify-content-center">
        <div class="col-md-6">

            <div class="glass-card overflow-hidden">
                <div class="p-3 fw-bold border-bottom" style="background: rgba(255,255,255,0.02)">
                    <i class="fas fa-plus-circle text-primary me-2"></i> Add New Class Slot
                </div>

                <div class="p-4">
                    <form method="POST">
                        {% csrf_token %}

                        <div class="mb-3">
                            <label class="form-label">Day of Week</label>
                            <select name="day" class="form-select" required>
                                <option value="0">Monday</option>
                                <option value="1">Tuesday</option>
                                <option value="2">Wednesday</option>
                                <option value="3">Thursday</option>
                                <option value="4">Friday</option>
                                <option value="5">Saturday</option>
                            </select>
                        </div>

                        <div class="row mb-3">
                            <div class="col">
                                <label class="form-label">Start Time</label>
                                <input
                                    type="time"
                                    name="start_time"
                                    class="form-control"
                                    required
                                >
                            </div>
                            <div class="col">
                                <label class="form-label">End Time</label>
                                <input
                                    type="time"
                                    name="end_time"
                                    class="form-control"
                                    required
                                >
                            </div>
                        </div>

                        <div class="mb-3">
                            <label class="form-label">Course / Subject</label>
                            <select name="course_id" class="form-select" required>
                                {% for course in courses %}
                                <option value="{{ course.id }}">
                                    {{ course.name }} ({{ course.code }})
                                </option>
                                {% endfor %}
                            </select>
                        </div>

                        <div class="mb-3">
                            <label class="form-label">Classroom</label>
                            <select name="room_id" class="form-select" required>
                                {% for room in rooms %}
                                <option value="{{ room.id }}">
                                    Room {{ room.room_number }}
                                </option>
                                {% endfor %}
                            </select>
                        </div>

                        <div class="d-grid gap-2">
                            <button type="submit" class="btn btn-primary">
                                Save to Timetable
                            </button>
                            <a
                                href="{% url 'manage_timetable' %}"
                                class="btn btn-link text-muted"
                            >
                                Cancel
                            </a>
                        </div>

                    </form>
                </div>
            </div>

        </div>
    </div>

</div>
{% endblock %}
