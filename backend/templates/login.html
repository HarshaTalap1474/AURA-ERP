{% extends 'base.html' %}

{% block title %}Fortress | Login{% endblock %}

{% block content %}
<style>
    /* Force override the base layout wrappers for the login page */
    .aura-main {
        margin-top: 0 !important;
        padding: 0 !important;
        min-height: 100vh !important;
    }
    .aura-topbar {
        display: none !important;
    }
    
    .login-wrapper {
        min-height: 100vh;
        display: flex;
        align-items: center;
        justify-content: center;
        position: relative;
        overflow: hidden;
    }
    
    /* Decorative glowing orb */
    .login-wrapper::before {
        content: '';
        position: absolute;
        width: 600px;
        height: 600px;
        background: radial-gradient(circle, var(--aura-primary) 0%, transparent 60%);
        opacity: 0.15;
        top: -150px;
        left: -150px;
        z-index: 0;
        border-radius: 50%;
    }
    
    .login-wrapper::after {
        content: '';
        position: absolute;
        width: 500px;
        height: 500px;
        background: radial-gradient(circle, var(--aura-accent) 0%, transparent 60%);
        opacity: 0.15;
        bottom: -150px;
        right: -150px;
        z-index: 0;
        border-radius: 50%;
    }

    .login-card {
        width: 100%;
        max-width: 440px;
        padding: 3.5rem 3rem;
        z-index: 1;
    }
    .brand {
        color: var(--aura-primary);
        font-weight: 800;
        text-align: center;
        margin-bottom: 2.5rem;
        font-size: 2rem;
        letter-spacing: -0.5px;
    }
    .form-control-glass {
        background: var(--glass-bg) !important;
        border: 1px solid var(--glass-border) !important;
        color: var(--text-main) !important;
        border-radius: 12px;
        padding: 14px 16px;
        font-weight: 500;
        transition: all 0.2s ease;
    }
    .form-control-glass:focus {
        background: transparent !important;
        border-color: var(--aura-primary) !important;
        box-shadow: 0 0 0 4px rgba(67, 56, 202, 0.1) !important;
    }
    .form-control-glass::placeholder {
        color: var(--text-muted);
        font-weight: 400;
    }
</style>

<div class="login-wrapper">
    <div class="glass-card login-card">
        <div class="brand">⚡ AURA ERP</div>

        <form method="POST">
            {% csrf_token %}

            {% if form.errors %}
                <div class="alert alert-danger p-2 small border-0 bg-danger text-white rounded-3 bg-opacity-75 backdrop-blur">
                    <i class="fas fa-exclamation-circle me-1"></i> Invalid credentials
                </div>
            {% endif %}

            <div class="mb-4">
                <label class="form-label small fw-bold text-uppercase" style="color: var(--text-muted); letter-spacing: 0.5px;">StudentID / Username</label>
                <input
                    type="text"
                    name="username"
                    class="form-control form-control-glass shadow-sm"
                    placeholder="Enter ID"
                    required
                >
            </div>

            <div class="mb-5">
                <label class="form-label small fw-bold text-uppercase" style="color: var(--text-muted); letter-spacing: 0.5px;">Password</label>
                <input
                    type="password"
                    name="password"
                    class="form-control form-control-glass shadow-sm"
                    placeholder="••••••"
                    required
                >
            </div>

            <button type="submit" class="btn btn-primary w-100 py-3 rounded-pill shadow-sm mt-2 mb-4 fs-6" style="background: linear-gradient(135deg, #4338ca 0%, #312e81 100%);">
                Sign In
            </button>
        </form>

        <div class="text-center mt-4 pt-3 border-top" style="border-color: var(--glass-border) !important;">
            <a href="{% url 'download_latest_app' %}" class="text-decoration-none fw-bold" style="color: var(--text-muted);">
                <i class="fas fa-mobile-alt me-1 text-primary"></i> <span class="hover-text-primary transition-all">Student? Download the mobile app.</span>
            </a>
        </div>
    </div>
</div>
{% endblock %}
